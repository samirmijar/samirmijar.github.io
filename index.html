<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Sam Store • AI & Gaming Top-Ups</title>
<meta name="theme-color" content="#070A12" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#070A12;
    --text:#EAF0FF;
    --muted:#A9B6D6;

    --glass:rgba(255,255,255,.06);
    --glass2:rgba(255,255,255,.08);
    --line:rgba(255,255,255,.12);

    --shadow:0 18px 60px rgba(0,0,0,.55);

    --neon1:#00EAFF;
    --neon2:#7C3AED;
    --neon3:#FF3D7A;

    --grad:linear-gradient(90deg,var(--neon1),var(--neon2),var(--neon3));
    --radius:22px;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:Inter,system-ui,Arial,sans-serif;
    color:var(--text);
    background:var(--bg);
    overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}

  /* ===== Futuristic Background ===== */
  .bg{
    position:fixed; inset:0; z-index:-1; overflow:hidden;
    background:
      radial-gradient(900px 600px at 20% 10%, rgba(0,234,255,.16), transparent 60%),
      radial-gradient(900px 600px at 80% 20%, rgba(124,58,237,.18), transparent 62%),
      radial-gradient(900px 600px at 50% 92%, rgba(255,61,122,.14), transparent 60%),
      #070A12;
  }

  /* subtle grid */
  .gridlines{
    position:absolute; inset:0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,.06) 1px, transparent 1px);
    background-size: 46px 46px;
    opacity:.14;
    mask-image: radial-gradient(circle at 50% 25%, #000 0%, transparent 68%);
    pointer-events:none;
  }

  /* animated blobs */
  .blob{
    position:absolute; width:520px; height:520px; border-radius:50%;
    filter: blur(48px);
    opacity:.55;
    animation: float 12s ease-in-out infinite;
    mix-blend-mode: screen;
    pointer-events:none;
  }
  .b1{left:-200px; top:-220px; background:radial-gradient(circle at 30% 30%, rgba(0,234,255,.9), rgba(124,58,237,.35), transparent 70%); animation-duration:14s;}
  .b2{right:-220px; top:10px; background:radial-gradient(circle at 30% 30%, rgba(255,61,122,.85), rgba(124,58,237,.35), transparent 70%); animation-duration:16s;}
  .b3{left:15%; bottom:-280px; background:radial-gradient(circle at 30% 30%, rgba(124,58,237,.9), rgba(0,234,255,.22), transparent 70%); animation-duration:18s;}

  @keyframes float{
    0%,100%{transform:translate3d(0,0,0) scale(1)}
    50%{transform:translate3d(22px,-18px,0) scale(1.04)}
  }

  /* particles */
  #particles{position:absolute; inset:0; width:100%; height:100%}

  /* ===== Topbar (clean gaming brand) ===== */
  .topbar{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    gap:12px;
    padding:12px 14px;
    background:rgba(9,12,22,.55);
    border-bottom:1px solid rgba(255,255,255,.10);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  .left-actions, .right-actions{
    display:flex; align-items:center; gap:10px;
  }

  .iconBtn{
    width:44px;height:44px;border-radius:16px;
    display:grid;place-items:center;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 10px 26px rgba(0,0,0,.35);
    cursor:pointer;
    transition:transform .15s ease, background .15s ease;
  }
  .iconBtn:active{transform:scale(.96)}
  .iconBtn:hover{background:rgba(255,255,255,.09)}
  .badge{
    position:absolute;
    margin-top:-30px;margin-left:26px;
    min-width:18px;height:18px;border-radius:999px;
    padding:0 6px;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:900;
    color:#fff;
    background:linear-gradient(90deg,#ff3d7a,#ff7a00);
    border:1px solid rgba(255,255,255,.16);
  }

  .logoCenter{
    display:flex; align-items:center; justify-content:center;
    gap:10px;
    min-width:140px;
  }
  .logoGif{height:34px; width:auto; object-fit:contain; filter: drop-shadow(0 12px 22px rgba(0,0,0,.45));}
  .brandText{
    font-weight:900;
    letter-spacing:.8px;
    text-transform:uppercase;
    font-size:14px;
    opacity:.9;
  }

  /* drawer */
  .drawer-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.55);
    opacity:0; pointer-events:none; transition:.2s; z-index:90;
  }
  .drawer{
    position:fixed; inset:0 0 0 auto; width:84%; max-width:360px;
    transform:translateX(100%); transition:.25s ease;
    z-index:91;
    padding:18px 16px;
    background:rgba(9,12,22,.86);
    border-left:1px solid rgba(255,255,255,.12);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  .nav-open .drawer{transform:none}
  .nav-open .drawer-overlay{opacity:1; pointer-events:auto}

  .drawerHead{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px;
  }
  .drawerHead b{letter-spacing:.5px}
  .closeBtn{
    width:44px;height:44px;border-radius:16px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);
    color:#fff; font-size:22px; cursor:pointer;
  }
  .drawerNav{display:grid; gap:10px; margin-top:8px}
  .drawerNav a{
    padding:12px 14px;border-radius:18px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);
    font-weight:800;
  }
  .drawerNav a.primary{
    background:linear-gradient(90deg, rgba(0,234,255,.20), rgba(124,58,237,.20), rgba(255,61,122,.18));
    border-color:rgba(255,255,255,.16);
  }

  /* ===== Layout ===== */
  .container{max-width:1100px;margin:0 auto;padding:18px 14px 120px}

  /* ===== Hero Card ===== */
  .hero{
    margin-top:10px;
    border-radius:28px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.10);
    box-shadow:var(--shadow);
    overflow:hidden;
    position:relative;
  }
  .hero::before{
    content:"";
    position:absolute; inset:-2px;
    background:linear-gradient(120deg, rgba(0,234,255,.7), rgba(124,58,237,.7), rgba(255,61,122,.7));
    background-size:260% 260%;
    animation: glow 7s linear infinite;
    opacity:.26;
    pointer-events:none;
  }
  @keyframes glow{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }

  .heroInner{
    position:relative; z-index:1;
    padding:22px 16px;
    display:grid;
    gap:14px;
  }

  .heroTitle{
    margin:0;
    font-size:30px;
    line-height:1.05;
    font-weight:900;
    letter-spacing:-.5px;
  }
  @media(min-width:520px){ .heroTitle{font-size:40px} }

  .heroTitle span{
    background:linear-gradient(90deg,#fff,#a7f5ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  .sub{
    margin:0;
    color:var(--muted);
    font-size:14px;
    max-width:58ch;
  }

  /* ===== Buttons ===== */
  .actions{
    display:grid;
    gap:12px;
    margin-top:6px;
  }

  .btn{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:16px 16px;
    border-radius:18px;
    font-weight:900;
    letter-spacing:.8px;
    text-transform:uppercase;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);
    box-shadow:0 16px 40px rgba(0,0,0,.40);
    transition:transform .18s ease, background .18s ease;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .btn:hover{transform:translateY(-2px); background:rgba(255,255,255,.08)}
  .btnPrimary{
    border-color:transparent;
    background:linear-gradient(90deg,#ff7a00,#ff3d7a);
  }
  .btnPrimary:hover{filter:saturate(1.05)}

  .btnIcon{
    width:22px;height:22px;object-fit:contain;
  }

  /* Offer button with animated glow */
  .offerBtn{
    background:linear-gradient(90deg, rgba(0,234,255,.14), rgba(124,58,237,.18));
    border:1px solid rgba(255,255,255,.16);
    position:relative;
    overflow:hidden;
  }
  .offerBtn::after{
    content:"";
    position:absolute; inset:-40%;
    background:radial-gradient(circle at 30% 40%, rgba(0,234,255,.22), transparent 55%),
               radial-gradient(circle at 70% 50%, rgba(255,61,122,.18), transparent 58%);
    animation: sweep 3.5s ease-in-out infinite;
    opacity:.8;
  }
  @keyframes sweep{
    0%,100%{transform:translateX(-6%)}
    50%{transform:translateX(6%)}
  }
  .offerBtn > *{position:relative; z-index:1}

  /* ===== WhatsApp Floating (premium) ===== */
  .waFloat{
    position:fixed;
    right:16px;
    bottom:18px;
    z-index:1200;
    width:64px;height:64px;border-radius:999px;
    display:grid;place-items:center;
    background:linear-gradient(90deg,#25D366,#0CCB5A);
    box-shadow:0 18px 44px rgba(0,0,0,.40);
    border:1px solid rgba(255,255,255,.14);
    transition:transform .15s ease;
  }
  .waFloat:active{transform:scale(.96)}
  .waFloat img{width:30px;height:30px;object-fit:contain}

  /* small footer */
  footer{
    padding:18px 12px;
    text-align:center;
    color:rgba(233,240,255,.7);
    border-top:1px solid rgba(255,255,255,.08);
    background:rgba(9,12,22,.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
</style>
</head>

<body>
  <!-- Background -->
  <div class="bg" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="gridlines"></div>
    <canvas id="particles"></canvas>
  </div>

  <!-- Topbar -->
  <header class="topbar">
    <div class="left-actions">
      <div style="position:relative">
        <button class="iconBtn" type="button" aria-label="Cart">
          🛍️
        </button>
        <span class="badge">0</span>
      </div>

      <button class="iconBtn" type="button" aria-label="Account">
        👤
      </button>
    </div>

    <div class="logoCenter" aria-label="The Sam Store">
      <img class="logoGif" src="png.images/samstore-logo.gif" alt="The Sam Store">
    </div>

    <div class="right-actions">
      <button class="iconBtn" type="button" aria-label="Theme">
        ☀️
      </button>
      <button class="iconBtn sm-menu-toggle" type="button" aria-label="Menu">
        ☰
      </button>
    </div>
  </header>

  <!-- Drawer -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer" aria-label="Menu">
    <div class="drawerHead">
      <b>THE SAM STORE</b>
      <button class="closeBtn" id="drawerClose" aria-label="Close">×</button>
    </div>
    <nav class="drawerNav">
      <a class="primary" href="shop.html">SHOP</a>
      <a href="todaysoffer.html">TODAY’S OFFER</a>
      <a href="shop.html#topup">TOP UP</a>
      <a href="shop.html#subs">SUBSCRIPTIONS</a>
      <a href="shop.html#gift">GIFT CARDS</a>
    </nav>
  </aside>

  <main class="container">
    <!-- Clean Futuristic Hero -->
    <section class="hero">
      <div class="heroInner">
        <h1 class="heroTitle"><span>AI. Subscriptions. Game Top-Ups.</span></h1>
        <p class="sub">Fast delivery in Nepal • Verified process • Support on WhatsApp</p>

        <div class="actions">
          <a class="btn offerBtn" href="todaysoffer.html">
            <img class="btnIcon" src="png.images/Referral-gift.gif" alt="">
            TODAY’S OFFER
          </a>

          <a class="btn btnPrimary" href="shop.html">
            🛒 SHOP NOW
          </a>
        </div>
      </div>
    </section>
  </main>

  <!-- WhatsApp Floating -->
  <a class="waFloat" href="https://wa.me/9779828560029" target="_blank" rel="noopener" aria-label="WhatsApp">
    <img src="png.images/logo-whatsapp.png" alt="WhatsApp">
  </a>

  <footer>
    ©2026 The Sam Store • Owned by Samir Mijar
  </footer>

<script>
  // Drawer open/close
  const body = document.body;
  const overlay = document.getElementById('drawerOverlay');
  const closeBtn= document.getElementById('drawerClose');
  document.querySelectorAll('.sm-menu-toggle').forEach(b=> b.addEventListener('click', ()=> body.classList.add('nav-open')));
  overlay.addEventListener('click', ()=> body.classList.remove('nav-open'));
  closeBtn.addEventListener('click', ()=> body.classList.remove('nav-open'));
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') body.classList.remove('nav-open'); });

  // Subtle particles (no library)
  (function(){
    const c = document.getElementById('particles');
    if(!c) return;
    const ctx = c.getContext('2d');
    let w,h,dpr;
    const dots = [];
    const DOTS = 55;

    function resize(){
      dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      w = c.clientWidth; h = c.clientHeight;
      c.width = Math.floor(w * dpr);
      c.height = Math.floor(h * dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    function rand(min,max){ return Math.random()*(max-min)+min; }
    function init(){
      dots.length = 0;
      for(let i=0;i<DOTS;i++){
        dots.push({
          x: rand(0,w), y: rand(0,h),
          vx: rand(-0.18,0.18), vy: rand(-0.18,0.18),
          r: rand(1.0,2.1),
          a: rand(0.16,0.48)
        });
      }
    }

    function step(){
      ctx.clearRect(0,0,w,h);

      for(const p of dots){
        p.x += p.vx; p.y += p.vy;
        if(p.x<0||p.x>w) p.vx *= -1;
        if(p.y<0||p.y>h) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(180,230,255,${p.a})`;
        ctx.fill();
      }

      for(let i=0;i<dots.length;i++){
        for(let j=i+1;j<dots.length;j++){
          const a = dots[i], b = dots[j];
          const dx = a.x-b.x, dy = a.y-b.y;
          const dist = Math.hypot(dx,dy);
          if(dist < 120){
            ctx.strokeStyle = `rgba(0,234,255,${(1-dist/120)*0.08})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(a.x,a.y);
            ctx.lineTo(b.x,b.y);
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(step);
    }

    resize(); init(); step();
    window.addEventListener('resize', ()=>{ resize(); init(); });
  }());
</script>
</body>
</html>
