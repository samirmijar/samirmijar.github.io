<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Premium • Ultra Club Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --green:#1DB954;
  --bg:#04060d;
  --text:#ffffff;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* ===== RGB CLUB BACKGROUND ===== */
.bg-wave{
  position:fixed;
  width:200%;
  height:200%;
  top:-50%;
  left:-50%;
  background:
    radial-gradient(circle at 30% 30%, rgba(29,185,84,.25), transparent 40%),
    radial-gradient(circle at 70% 70%, rgba(0,255,255,.2), transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(255,0,150,.15), transparent 50%);
  animation:waveMove 12s linear infinite alternate;
  z-index:-2;
}
@keyframes waveMove{
  0%{transform:rotate(0deg) scale(1)}
  100%{transform:rotate(360deg) scale(1.1)}
}

/* ===== SOUND WAVE LINES ===== */
.wave-lines{
  position:fixed;
  bottom:0;
  width:100%;
  height:200px;
  background:repeating-linear-gradient(
    90deg,
    rgba(29,185,84,.3) 0px,
    rgba(29,185,84,.3) 2px,
    transparent 2px,
    transparent 6px
  );
  animation:waveScroll 2s linear infinite;
  opacity:.3;
  z-index:-1;
}
@keyframes waveScroll{
  from{background-position:0 0}
  to{background-position:100px 0}
}

/* ===== FLOATING PARTICLES ===== */
.particle{
  position:fixed;
  width:5px;height:5px;
  background:var(--green);
  border-radius:50%;
  opacity:.6;
  animation:floatUp 12s linear infinite;
}
@keyframes floatUp{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

/* ===== LAYOUT ===== */
.wrap{
  max-width:760px;
  margin:auto;
  padding:20px;
  text-align:center;
}

/* ===== HERO ===== */
h1{
  font-size:34px;
  font-weight:900;
  text-shadow:0 0 25px var(--green);
  margin-top:20px;
}
.subtitle{
  opacity:.7;
  margin-bottom:20px;
}

/* ===== 3D VINYL ===== */
.vinyl{
  width:160px;height:160px;
  margin:20px auto;
  border-radius:50%;
  background:radial-gradient(circle,#222 20%,#000 60%);
  border:8px solid #111;
  box-shadow:0 0 40px rgba(29,185,84,.6);
  animation:spin 5s linear infinite;
  transform-style:preserve-3d;
}
@keyframes spin{
  from{transform:rotateY(0deg)}
  to{transform:rotateY(360deg)}
}

/* ===== EQUALIZER ===== */
.equalizer{
  display:flex;
  justify-content:center;
  gap:6px;
  margin:20px 0;
}
.bar{
  width:6px;
  height:30px;
  background:var(--green);
  animation:beat 1s infinite ease-in-out;
}
.bar:nth-child(2){animation-delay:.2s}
.bar:nth-child(3){animation-delay:.4s}
.bar:nth-child(4){animation-delay:.3s}
.bar:nth-child(5){animation-delay:.1s}
@keyframes beat{
  0%,100%{height:25px}
  50%{height:70px}
}

/* ===== CARD ===== */
.card{
  background:rgba(20,25,40,.8);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:18px;
  margin:18px 0;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 0 30px rgba(29,185,84,.2);
}

.plan{
  border:1px solid rgba(255,255,255,.08);
  padding:14px;
  border-radius:14px;
  margin-bottom:12px;
  cursor:pointer;
  transition:.3s;
}
.plan:hover{
  transform:translateY(-5px);
  box-shadow:0 0 25px rgba(29,185,84,.6);
}
.plan.active{
  border-color:var(--green);
  box-shadow:0 0 30px rgba(29,185,84,.9);
}

.stock{
  background:#ff3b6b;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:800;
}

/* ===== BUTTON ===== */
.btn{
  width:100%;
  margin-top:14px;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
  background:var(--green);
  color:#000;
  box-shadow:0 0 35px rgba(29,185,84,.8);
  transition:.2s;
}
.btn:hover{transform:scale(1.05)}

.whatsapp{
  display:block;
  margin-top:16px;
  padding:12px;
  border-radius:14px;
  background:#25D366;
  color:#fff;
  font-weight:900;
}
.note{
  font-size:13px;
  opacity:.7;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="bg-wave"></div>
<div class="wave-lines"></div>

<script>
for(let i=0;i<30;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(6+Math.random()*10)+"s";
  document.body.appendChild(p);
}
</script>

<div class="wrap">

<h1>Spotify Premium</h1>
<div class="subtitle">Ultra Club Edition — Feel The Beat</div>

<div class="equalizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<div class="vinyl"></div>

<div class="card">
<div class="plan active">
<strong>Spotify Premium – 3 Months</strong>
<div>750 Rs</div>
</div>

<div class="plan" style="opacity:.6;cursor:not-allowed;">
<strong>Spotify Premium – 12 Months <span class="stock">Stock Out</span></strong>
<div>3500 Rs</div>
</div>

<button class="btn">Place Order</button>

<a class="whatsapp" href="https://wa.me/9779828560029" target="_blank">
Contact on WhatsApp
</a>

<p class="note">
Activation details will be sent to your email after payment verification.
</p>

</div>
</div>

<script>
document.querySelectorAll(".plan").forEach(p=>{
  p.addEventListener("click",()=>{
    if(p.style.cursor==="not-allowed") return;
    document.querySelectorAll(".plan").forEach(x=>x.classList.remove("active"));
    p.classList.add("active");
  });
});
</script>

</body>
</html>
